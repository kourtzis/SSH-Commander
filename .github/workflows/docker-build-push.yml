name: Build and Push Docker Image

on:
  push:
    branches:
      - master          # Trigger on push to master
    # Optional: only trigger when specific paths change
    paths:
#     - 'src/**'
#     - 'Dockerfile'
#     - '.github/workflows/**'

env:
  IMAGE_NAME: kourtzis/ssh-commander
  REGISTRY: docker.io   # or docker.io for Docker Hub

jobs:
  build-and-push:
    name: Build and Push
    runs-on: ubuntu-latest   # Use ubuntu-latest for GitHub-hosted runners

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Read VERSION file
        id: version
        run: |
          VERSION=$(cat VERSION | tr -d '[:space:]')
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
          echo "Read version: $VERSION"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.version.outputs.VERSION }}
          cache-from: type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:buildcache
          cache-to: type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:buildcache,mode=max

      - name: Verify push
        run: |
          echo "✅ Pushed ${{ env.IMAGE_NAME }}:${{ steps.version.outputs.VERSION }}"
          echo "✅ Pushed ${{ env.IMAGE_NAME }}:latest"
