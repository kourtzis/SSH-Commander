openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: SSH Commander API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: auth
    description: Authentication
  - name: users
    description: User management
  - name: routers
    description: Router management
  - name: groups
    description: Router group management
  - name: snippets
    description: Code snippet management
  - name: jobs
    description: Batch job management
  - name: schedules
    description: Job schedule management
  - name: credentials
    description: Credential profile management
  - name: views
    description: Saved views management

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /auth/login:
    post:
      operationId: login
      tags: [auth]
      summary: Login with username and password
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
      responses:
        "200":
          description: Login successful
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "401":
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/logout:
    post:
      operationId: logout
      tags: [auth]
      summary: Logout current user
      responses:
        "200":
          description: Logged out
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"

  /auth/me:
    get:
      operationId: getMe
      tags: [auth]
      summary: Get current authenticated user
      responses:
        "200":
          description: Current user info
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /users:
    get:
      operationId: listUsers
      tags: [users]
      summary: List all users (admin only)
      responses:
        "200":
          description: List of users
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/User"
    post:
      operationId: createUser
      tags: [users]
      summary: Create a new user (admin only)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateUserRequest"
      responses:
        "201":
          description: User created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"

  /users/{id}:
    get:
      operationId: getUser
      tags: [users]
      summary: Get user by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: User found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "404":
          description: User not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    put:
      operationId: updateUser
      tags: [users]
      summary: Update a user
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateUserRequest"
      responses:
        "200":
          description: User updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
    delete:
      operationId: deleteUser
      tags: [users]
      summary: Delete a user
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"

  /routers:
    get:
      operationId: listRouters
      tags: [routers]
      summary: List all routers
      responses:
        "200":
          description: List of routers
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Router"
    post:
      operationId: createRouter
      tags: [routers]
      summary: Create a new router
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateRouterRequest"
      responses:
        "201":
          description: Router created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Router"

  /routers/{id}:
    get:
      operationId: getRouter
      tags: [routers]
      summary: Get router by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Router found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Router"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    put:
      operationId: updateRouter
      tags: [routers]
      summary: Update a router
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateRouterRequest"
      responses:
        "200":
          description: Router updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Router"
    delete:
      operationId: deleteRouter
      tags: [routers]
      summary: Delete a router
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"

  /routers/import:
    post:
      operationId: importRouters
      tags: [routers]
      summary: Mass import routers from parsed file data
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ImportRoutersRequest"
      responses:
        "200":
          description: Import results
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ImportRoutersResponse"

  /groups:
    get:
      operationId: listGroups
      tags: [groups]
      summary: List all groups (tree structure)
      responses:
        "200":
          description: List of groups
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/RouterGroup"
    post:
      operationId: createGroup
      tags: [groups]
      summary: Create a new router group
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateGroupRequest"
      responses:
        "201":
          description: Group created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RouterGroup"

  /groups-counts:
    get:
      operationId: getGroupsCounts
      tags: [groups]
      summary: Get sub-group and device counts for all groups
      responses:
        "200":
          description: Map of group ID to counts
          content:
            application/json:
              schema:
                type: object
                additionalProperties:
                  type: object
                  properties:
                    subgroups:
                      type: integer
                    devices:
                      type: integer
                  required:
                    - subgroups
                    - devices

  /groups/{id}:
    get:
      operationId: getGroup
      tags: [groups]
      summary: Get group by ID with members
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Group found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RouterGroupWithMembers"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    put:
      operationId: updateGroup
      tags: [groups]
      summary: Update a group
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateGroupRequest"
      responses:
        "200":
          description: Group updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RouterGroup"
    delete:
      operationId: deleteGroup
      tags: [groups]
      summary: Delete a group
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"

  /groups/{id}/members:
    post:
      operationId: addGroupMember
      tags: [groups]
      summary: Add a router or sub-group to a group
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AddGroupMemberRequest"
      responses:
        "200":
          description: Member added
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"
    delete:
      operationId: removeGroupMember
      tags: [groups]
      summary: Remove a router or sub-group from a group
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RemoveGroupMemberRequest"
      responses:
        "200":
          description: Member removed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"

  /snippets:
    get:
      operationId: listSnippets
      tags: [snippets]
      summary: List all snippets
      parameters:
        - name: tag
          in: query
          required: false
          schema:
            type: string
      responses:
        "200":
          description: List of snippets
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Snippet"
    post:
      operationId: createSnippet
      tags: [snippets]
      summary: Create a new snippet
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateSnippetRequest"
      responses:
        "201":
          description: Snippet created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Snippet"

  /snippets/{id}:
    get:
      operationId: getSnippet
      tags: [snippets]
      summary: Get snippet by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Snippet found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Snippet"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    put:
      operationId: updateSnippet
      tags: [snippets]
      summary: Update a snippet
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateSnippetRequest"
      responses:
        "200":
          description: Snippet updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Snippet"
    delete:
      operationId: deleteSnippet
      tags: [snippets]
      summary: Delete a snippet
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"

  /jobs:
    get:
      operationId: listJobs
      tags: [jobs]
      summary: List all batch jobs
      responses:
        "200":
          description: List of jobs
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/BatchJob"
    post:
      operationId: createJob
      tags: [jobs]
      summary: Create and start a batch job
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateJobRequest"
      responses:
        "201":
          description: Job created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BatchJob"

  /jobs/{id}:
    get:
      operationId: getJob
      tags: [jobs]
      summary: Get job by ID with task results
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Job found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BatchJobWithTasks"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    put:
      operationId: updateJob
      tags: [jobs]
      summary: Update a scheduled job
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateJobRequest"
      responses:
        "200":
          description: Job updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BatchJob"
        "400":
          description: Job cannot be edited
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    delete:
      operationId: deleteJob
      tags: [jobs]
      summary: Delete a job and its tasks
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Job deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /jobs/{id}/cancel:
    post:
      operationId: cancelJob
      tags: [jobs]
      summary: Cancel a running job
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Job cancelled
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"

  /jobs/{id}/rerun:
    post:
      operationId: rerunJob
      tags: [jobs]
      summary: Re-run a job by cloning it and executing immediately
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "201":
          description: New job created and started
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BatchJob"

  /schedules:
    get:
      operationId: listSchedules
      tags: [schedules]
      summary: List all schedules
      responses:
        "200":
          description: List of schedules
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Schedule"
    post:
      operationId: createSchedule
      tags: [schedules]
      summary: Create a new schedule
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateScheduleRequest"
      responses:
        "201":
          description: Schedule created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Schedule"

  /schedules/{id}:
    get:
      operationId: getSchedule
      tags: [schedules]
      summary: Get a schedule by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Schedule details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Schedule"
    put:
      operationId: updateSchedule
      tags: [schedules]
      summary: Update a schedule
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateScheduleRequest"
      responses:
        "200":
          description: Schedule updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Schedule"
    delete:
      operationId: deleteSchedule
      tags: [schedules]
      summary: Delete a schedule
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Schedule deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"

  /schedules/calendar:
    get:
      operationId: getScheduleCalendar
      tags: [schedules]
      summary: Get all scheduled runs in a given month
      parameters:
        - name: year
          in: query
          required: true
          schema: { type: integer }
        - name: month
          in: query
          required: true
          schema: { type: integer, minimum: 1, maximum: 12 }
      responses:
        "200":
          description: List of upcoming runs
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ScheduleCalendarEntry"

  /credentials:
    get:
      operationId: listCredentialProfiles
      tags: [credentials]
      summary: List all credential profiles
      responses:
        "200":
          description: List
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/CredentialProfile"
    post:
      operationId: createCredentialProfile
      tags: [credentials]
      summary: Create a credential profile (admin only)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CredentialProfileRequest"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CredentialProfile"

  /credentials/{id}:
    put:
      operationId: updateCredentialProfile
      tags: [credentials]
      summary: Update a credential profile (admin only)
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CredentialProfileRequest"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CredentialProfile"
    delete:
      operationId: deleteCredentialProfile
      tags: [credentials]
      summary: Delete a credential profile (admin only)
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"

  /saved-views:
    get:
      operationId: listSavedViews
      tags: [views]
      summary: List saved views for the current user
      parameters:
        - name: pageKey
          in: query
          required: false
          schema: { type: string }
      responses:
        "200":
          description: List
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/SavedView"
    post:
      operationId: createSavedView
      tags: [views]
      summary: Create a saved view
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SavedViewRequest"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SavedView"

  /saved-views/{id}:
    delete:
      operationId: deleteSavedView
      tags: [views]
      summary: Delete a saved view
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"

  /routers/{id}/uptime:
    get:
      operationId: getRouterUptime
      tags: [routers]
      summary: Get daily uptime history for a router
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
        - name: days
          in: query
          required: false
          schema: { type: integer, minimum: 1, maximum: 365 }
      responses:
        "200":
          description: Daily uptime data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RouterUptime"

  /routers/uptime:
    get:
      operationId: getRoutersUptime
      tags: [routers]
      summary: Get current uptime % for all routers (last 30 days)
      responses:
        "200":
          description: Map of router id to uptime aggregate (with daily series)
          content:
            application/json:
              schema:
                type: object
                additionalProperties:
                  type: object
                  properties:
                    uptimePercent: { type: number }
                    totalChecks: { type: integer }
                    successCount: { type: integer }
                    days:
                      type: array
                      items:
                        type: object
                        properties:
                          day: { type: string }
                          totalChecks: { type: integer }
                          successCount: { type: integer }
                        required: [day, totalChecks, successCount]
                  required: [uptimePercent, totalChecks, successCount, days]

  /routers/{id}/fingerprint:
    post:
      operationId: fingerprintRouter
      tags: [routers]
      summary: Detect vendor and OS version via SSH
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: Detection result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FingerprintResult"

  /routers/fingerprint-all:
    post:
      operationId: fingerprintAllRouters
      tags: [routers]
      summary: Detect vendor/OS for all routers in parallel
      responses:
        "200":
          description: Result summary
          content:
            application/json:
              schema:
                type: object
                properties:
                  successCount: { type: integer }
                  failedCount: { type: integer }
                required: [successCount, failedCount]

  /jobs/dry-run:
    post:
      operationId: dryRunJob
      tags: [jobs]
      summary: Preview a job without executing it
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateJobRequest"
      responses:
        "200":
          description: Resolved scripts per device
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/DryRunEntry"

  /jobs/{id}/export:
    get:
      operationId: exportJob
      tags: [jobs]
      summary: Export job task results in csv, txt, or zip format
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
        - name: format
          in: query
          required: true
          schema:
            type: string
            enum: [csv, txt, zip]
      responses:
        "200":
          description: File download (content type varies by format)

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
      required:
        - error

    MessageResponse:
      type: object
      properties:
        message:
          type: string
      required:
        - message

    LoginRequest:
      type: object
      properties:
        username:
          type: string
        password:
          type: string
      required:
        - username
        - password

    AuthResponse:
      type: object
      properties:
        user:
          $ref: "#/components/schemas/User"
        message:
          type: string
      required:
        - user
        - message

    User:
      type: object
      properties:
