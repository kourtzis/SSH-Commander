    BatchJob:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        scriptCode:
          type: string
        status:
          type: string
          enum: [pending, running, completed, failed, cancelled, scheduled]
        targetRouterIds:
          type: array
          items:
            type: integer
        targetGroupIds:
          type: array
          items:
            type: integer
        autoConfirm:
          type: boolean
        timeoutSeconds: { type: integer }
        retryCount: { type: integer }
        retryBackoffSeconds: { type: integer }
        totalTasks:
          type: integer
        completedTasks:
          type: integer
        failedTasks:
          type: integer
        createdBy:
          type: integer
        createdAt:
          type: string
          format: date-time
        completedAt:
          type: string
          format: date-time
          nullable: true
      required:
        - id
        - name
        - scriptCode
        - status
        - targetRouterIds
        - targetGroupIds
        - autoConfirm
        - timeoutSeconds
        - retryCount
        - retryBackoffSeconds
        - totalTasks
        - completedTasks
        - failedTasks
        - createdBy
        - createdAt

    BatchJobWithTasks:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        scriptCode:
          type: string
        status:
          type: string
          enum: [pending, running, completed, failed, cancelled, scheduled]
        targetRouterIds:
          type: array
          items:
            type: integer
        targetGroupIds:
          type: array
          items:
            type: integer
        excelData:
          type: array
          items:
            type: object
            additionalProperties:
              type: string
          nullable: true
        autoConfirm:
          type: boolean
        timeoutSeconds: { type: integer }
        retryCount: { type: integer }
        retryBackoffSeconds: { type: integer }
        totalTasks:
          type: integer
        completedTasks:
          type: integer
        failedTasks:
          type: integer
        createdBy:
          type: integer
        createdAt:
          type: string
          format: date-time
        completedAt:
          type: string
          format: date-time
          nullable: true
        tasks:
          type: array
          items:
            $ref: "#/components/schemas/JobTask"
      required:
        - id
        - name
        - scriptCode
        - status
        - targetRouterIds
        - targetGroupIds
        - autoConfirm
        - timeoutSeconds
        - retryCount
        - retryBackoffSeconds
        - totalTasks
        - completedTasks
        - failedTasks
        - createdBy
        - createdAt
        - tasks

    JobTask:
      type: object
      properties:
        id:
          type: integer
        jobId:
          type: integer
        routerId:
          type: integer
        routerName:
          type: string
        routerIp:
          type: string
        status:
          type: string
          enum: [pending, running, success, failed, waiting_input, needs_attention]
        output:
          type: string
          nullable: true
        errorMessage:
          type: string
          nullable: true
        connectionLog:
          type: string
          nullable: true
        resolvedScript:
          type: string
          nullable: true
        promptText:
          type: string
          nullable: true
        failureReason:
          type: string
          nullable: true
          description: |
            Set when status="needs_attention" — the failure signal word(s)
            detected in the device output and the line(s) containing them.
            The SSH session itself succeeded; this flags suspicious output.
        attemptCount:
          type: integer
        startedAt:
          type: string
          format: date-time
          nullable: true
        completedAt:
          type: string
          format: date-time
          nullable: true
      required:
        - id
        - jobId
        - routerId
        - routerName
        - routerIp
        - status

    CreateJobRequest:
      type: object
      properties:
        name:
          type: string
        scriptCode:
          type: string
        targetRouterIds:
          type: array
          items:
            type: integer
        targetGroupIds:
          type: array
          items:
            type: integer
        excelData:
          type: array
          items:
            type: object
            additionalProperties:
              type: string
          description: Rows from Excel file for tag substitution, each row is applied per router
        mode:
          type: string
          enum: [run, schedule]
          description: Run executes immediately (default), schedule saves as template for scheduling
        autoConfirm:
          type: boolean
          description: Automatically answer yes to SSH confirmation prompts (default true)
        timeoutSeconds:
          type: integer
          description: Per-device SSH timeout in seconds (1-3600, default 30)
        retryCount:
          type: integer
          description: Number of retries on connection failure (0-10, default 0)
        retryBackoffSeconds:
          type: integer
          description: Seconds to wait between retries (default 5)
      required:
        - name
        - scriptCode
        - targetRouterIds
        - targetGroupIds

