          type: integer
        username:
          type: string
        email:
          type: string
        role:
          type: string
          enum: [admin, operator]
        canTerminal:
          type: boolean
          description: Whether this user has access to the per-device terminal. Admins always have access.
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - username
        - role
        - createdAt

    CreateUserRequest:
      type: object
