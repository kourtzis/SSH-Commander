services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: mikromanager
      POSTGRES_USER: mikromanager
      POSTGRES_PASSWORD: ${DB_PASSWORD:-changeme}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mikromanager"]
      interval: 5s
      timeout: 3s
      retries: 5

  app:
    image: kourtzis/ssh-commander:latest
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "${APP_PORT:-3000}:3000"
    environment:
      DATABASE_URL: postgresql://mikromanager:${DB_PASSWORD:-changeme}@db:5432/mikromanager
      SESSION_SECRET: ${SESSION_SECRET:-change-this-to-a-long-random-string}
      PORT: 3000
      NODE_ENV: production
      PUBLIC_DIR: /app/public
      # Session cookie's `Secure` flag. Defaults to `true` (correct when a
      # real HTTPS reverse proxy sits in front and forwards
      # `X-Forwarded-Proto: https`). Set COOKIE_SECURE=false in your .env
      # if you're accessing the app over plain HTTP — otherwise the
      # browser will reject the session cookie and login will loop.
      COOKIE_SECURE: ${COOKIE_SECURE:-true}
      # Number of trusted reverse-proxy hops in front of the container.
      # 1 is correct for the typical "single nginx/Caddy/Traefik in front"
      # topology. Set to 0 only if you expose the container directly to
      # the internet with no proxy at all (rare; also disables IP-based
      # rate limiting accuracy).
      TRUST_PROXY_HOPS: ${TRUST_PROXY_HOPS:-1}

volumes:
  pgdata:
