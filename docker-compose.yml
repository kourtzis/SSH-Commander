services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: mikromanager
      POSTGRES_USER: mikromanager
      POSTGRES_PASSWORD: ${DB_PASSWORD:?set DB_PASSWORD in .env}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mikromanager"]
      interval: 5s
      timeout: 3s
      retries: 5

  app:
    build: .
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "3000:3000"
    # Load secret variables straight from .env into the container.
    # The .env file must live next to this docker-compose.yml and contain:
    #   SESSION_SECRET=<64-char hex>            (required, min 16 chars)
    #   CREDENTIAL_ENCRYPTION_KEY=<64-char hex> (required, AES-256-GCM key)
    #   DB_PASSWORD=<your-db-password>          (also used by ${DB_PASSWORD} below)
    #   INITIAL_ADMIN_PASSWORD=<optional>       (only used on very first start)
    # LOSING CREDENTIAL_ENCRYPTION_KEY PERMANENTLY BRICKS EVERY STORED
    # DEVICE PASSWORD — back it up to a password manager / secrets vault.
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://mikromanager:${DB_PASSWORD}@db:5432/mikromanager
      PORT: 3000
      NODE_ENV: production
      PUBLIC_DIR: /app/public
      # Session cookie's `Secure` flag. Set to `false` when accessing the
      # app over plain HTTP (e.g. http://localhost:3000 with no reverse
      # proxy in front). Without this, the browser silently rejects the
      # session cookie and the login dialog reappears after a successful
      # sign-in. If you put a real reverse proxy with HTTPS in front
      # (nginx, Caddy, Traefik, Cloudflare), remove this line — secure
      # cookies are the right default for production.
      COOKIE_SECURE: "false"
      # Number of trusted reverse-proxy hops in front of the container.
      # Default 1 already covers most setups; only change if you know
      # you have a different topology.
      # TRUST_PROXY_HOPS: "1"

volumes:
  pgdata:
