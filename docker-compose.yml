services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: mikromanager
      POSTGRES_USER: mikromanager
      POSTGRES_PASSWORD: ${DB_PASSWORD:?set DB_PASSWORD in .env}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mikromanager"]
      interval: 5s
      timeout: 3s
      retries: 5

  app:
    build: .
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgresql://mikromanager:${DB_PASSWORD}@db:5432/mikromanager
      # Required. Min 16 chars. Cannot be a known placeholder string —
      # the app will refuse to start in production if it is.
      SESSION_SECRET: ${SESSION_SECRET:?set SESSION_SECRET in .env}
      # Required as of 1.14.0. 32 bytes (64 hex chars or 44-char base64).
      # AES-256-GCM master key for at-rest credential encryption.
      # LOSING THIS KEY PERMANENTLY BRICKS EVERY STORED DEVICE PASSWORD.
      # Back it up to your password manager / secrets vault.
      CREDENTIAL_ENCRYPTION_KEY: ${CREDENTIAL_ENCRYPTION_KEY:?set CREDENTIAL_ENCRYPTION_KEY in .env}
      # Optional. Sets the admin password on the very first start (when
      # no users exist). If unset, a random 24-char password is printed
      # once to the container logs. Ignored on subsequent starts.
      INITIAL_ADMIN_PASSWORD: ${INITIAL_ADMIN_PASSWORD:-}
      PORT: 3000
      NODE_ENV: production
      PUBLIC_DIR: /app/public
      # Session cookie's `Secure` flag. Set to `false` when accessing the
      # app over plain HTTP (e.g. http://localhost:3000 with no reverse
      # proxy in front). Without this, the browser silently rejects the
      # session cookie and the login dialog reappears after a successful
      # sign-in. If you put a real reverse proxy with HTTPS in front
      # (nginx, Caddy, Traefik, Cloudflare), remove this line — secure
      # cookies are the right default for production.
      COOKIE_SECURE: "false"
      # Number of trusted reverse-proxy hops in front of the container.
      # Default 1 already covers most setups; only change if you know
      # you have a different topology.
      # TRUST_PROXY_HOPS: "1"

volumes:
  pgdata:
